name: Publish to Hex

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: hex-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Restore dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: publish-${{ runner.os }}-otp-29-elixir-1.20-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Match the release tag to the package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(
            mix run --no-compile --no-deps-check --no-start \
              -e 'IO.write(Mix.Project.config()[:version])'
          )"

          if [[ "$version" == *-* ]]; then
            echo "Refusing to publish prerelease package version: $version" >&2
            exit 1
          fi

          if [[ "$RELEASE_TAG" != "v$version" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version $version" >&2
            exit 1
          fi

      - name: Verify the release
        run: |
          mix format --check-formatted
          mix compile --warnings-as-errors
          mix test
          mix docs --warnings-as-errors

      - name: Inspect the Hex publication
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --dry-run

      - name: Publish package and documentation
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
